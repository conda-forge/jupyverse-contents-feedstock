schema_version: 1

context:
  version: "0.1.2"

package:
  name: jupyverse-contents
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-contents/jupyverse_contents-${{ version }}.tar.gz
    sha256: 7a51a71af2672d05102d83f32868301afd726cf3cafe1e50a3d4068f70c46380

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - anyio
    - anyioutils
    - fastapi-core
    - jupyverse-api >=0.15.0,<0.16.0
    - jupyverse-auth >=0.2.0,<0.3.0
    - pydantic

tests:
  - python:
      imports: jupyverse_contents
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/contents
  summary: The API for Jupyverse's contents.

extra:
  recipe-maintainers:
    - davidbrochart
